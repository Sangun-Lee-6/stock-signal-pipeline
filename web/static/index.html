<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Signal</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="panel rail">
        <div class="brand">Stock Signal</div>
        <div class="stock-list" id="stock-list"></div>
      </aside>

      <main class="main">
        <section class="panel hero">
          <div>
            <p class="eyebrow">Market Signal</p>
            <h1 class="title" id="stock-title">로딩 중</h1>
            <p class="subtitle">
              최근 종가 흐름과 주요 이벤트를 한 화면에서 빠르게 확인합니다.
            </p>
          </div>
          <div class="hero-stat">
            <div class="stat-label">최근 종가</div>
            <div class="stat-value" id="stat-price">-</div>
          </div>
        </section>

        <section class="panel chart-card">
          <h2 class="section-title">최근 종가 흐름</h2>
          <p class="event-note">고점, 저점, 최신 가격을 차트 안에서 바로 확인할 수 있습니다.</p>
          <div class="chart-wrap">
            <svg class="chart-svg" id="chart" viewBox="0 0 920 520" preserveAspectRatio="none"></svg>
            <div class="chart-empty" id="chart-empty">표시할 가격 데이터가 없습니다.</div>
          </div>
        </section>
      </main>

      <aside class="panel events">
        <h2 class="section-title">연결 이벤트</h2>
        <p class="event-note">이벤트 API 연결 전까지는 샘플 카드가 함께 표시됩니다.</p>
        <div class="event-list" id="event-list"></div>
      </aside>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
