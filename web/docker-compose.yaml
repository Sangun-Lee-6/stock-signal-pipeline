services:
  web-app:
    image: python:3.12-slim
    env_file:
      - ./.env
    environment:
      WEB_APP_PORT: "8000"
      WEB_DUCKDB_PATH: /data/mart/stock_signal.duckdb
      WEB_DUCKDB_READ_ONLY: "true"
    working_dir: /app
    volumes:
      - ./app.py:/app/app.py
      - ./static:/app/static
      - ../airflow/s3/mart:/data/mart
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - |
          pip install --no-cache-dir fastapi uvicorn duckdb
          uvicorn app:app --host 0.0.0.0 --port "$${WEB_APP_PORT}"
    restart: unless-stopped
